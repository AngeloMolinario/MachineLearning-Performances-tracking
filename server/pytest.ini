[pytest]
# ─────────────────────────────────────────────────────────────────────────────
# pytest.ini – Configurazione della suite di test per il server FastAPI
# ─────────────────────────────────────────────────────────────────────────────

# Cartella radice dei test
testpaths = test

# Verbosità e output
addopts =
    -v
    --tb=short

# Formato del log durante i test
log_cli = true
log_cli_level = WARNING
