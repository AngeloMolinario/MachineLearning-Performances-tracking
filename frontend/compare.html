<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ML Training Monitor — Compare multiple experiment runs" />
    <title>ML Monitor — Compare Runs</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
</head>

<body>
    <div class="page-wrapper">
        <div id="navbar-slot"></div>

        <!-- Breadcrumbs -->
        <div class="breadcrumbs">
            <a href="index.html">Home</a>
            <span class="separator">›</span>
            <a href="#" id="breadcrumb-model-link">Model</a>
            <span class="separator">›</span>
            <span class="current">Compare Runs</span>
        </div>

        <!-- Page Header -->
        <div class="page-header">
            <h1 class="page-title"><span class="gradient-text">Compare</span> Runs</h1>
            <p class="page-subtitle" id="compare-subtitle">Overlayed charts for selected experiments</p>
        </div>

        <!-- Runs Legend -->
        <div class="compare-toolbar" id="runs-summary">
            <div class="compare-toolbar-info" id="runs-legend"></div>
            <div style="display:flex;align-items:center;gap:16px;">
                <div class="label-select-group">
                    <span class="label-select-label">Label by:</span>
                    <select class="label-select" id="label-by-select">
                        <option value="__run_id__">Run ID</option>
                    </select>
                </div>
                <div id="compare-polling-status"></div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar-row">
            <div class="toolbar-left">
                <div class="toggle-group">
                    <span class="toggle-label">View:</span>
                    <div class="toggle-buttons">
                        <button class="toggle-btn active" data-view="tabs">Tabs</button>
                        <button class="toggle-btn" data-view="scroll">Scroll</button>
                    </div>
                </div>
                <div class="toggle-group">
                    <span class="toggle-label">Mode:</span>
                    <div class="toggle-buttons">
                        <button class="toggle-btn active" data-chartmode="overlay">Overlay</button>
                        <button class="toggle-btn" data-chartmode="split">Split</button>
                    </div>
                </div>
                <div class="toggle-group" id="split-tasks-group"
                    style="display: none; border-left: 1px solid var(--border-glass); padding-left: 16px; margin-left: 8px;">
                    <label class="checkbox-control">
                        <input type="checkbox" id="split-tasks" /> Separate Tasks
                    </label>
                </div>
            </div>
            <div class="toolbar-right">
                <label class="checkbox-control">
                    <input type="checkbox" id="show-min" /> Show Min
                </label>
                <label class="checkbox-control">
                    <input type="checkbox" id="show-max" /> Show Max
                </label>
            </div>
        </div>

        <!-- Charts Area -->
        <div id="charts-area">
            <div class="loading-spinner">
                <div class="spinner"></div><span>Loading comparison data...</span>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="charts.js"></script>
    <script>
        document.getElementById('navbar-slot').innerHTML = buildNavbar('');

        const runIdsParam = getQueryParam('runs') || '';
        const modelName = getQueryParam('model') || 'Model';
        const projectName = getQueryParam('project') || '';
        const modelId = getQueryParam('model_id') || '';
        const runIds = runIdsParam.split(',').filter(Boolean);

        // Breadcrumbs
        const modelLink = document.getElementById('breadcrumb-model-link');
        modelLink.textContent = modelName;
        modelLink.href = `model.html?id=${modelId}&name=${encodeURIComponent(modelName)}&project=${encodeURIComponent(projectName)}`;
        document.getElementById('compare-subtitle').textContent = `${runIds.length} experiments · ${modelName}`;
        document.title = `ML Monitor — Compare ${runIds.length} Runs`;

        // State
        let runsLossData = {};
        let runsMetricData = {};
        let runStatuses = {};
        let runsInfo = {};          // full run objects keyed by id
        let labelBy = '__run_id__'; // current label selection
        let charts = {};
        let viewMode = 'tabs';
        let chartMode = 'overlay';  // 'overlay' | 'split'
        let activeTab = 'loss';
        let showMin = false;
        let showMax = false;
        const polling = new PollingManager(3000);

        // ── Label-by handler ──────────────────────

        document.getElementById('label-by-select').addEventListener('change', (e) => {
            labelBy = e.target.value;
            updateLabels();
            buildLegend();
            rebuildAllCharts();
        });

        // ── Toolbar handlers ──────────────────────

        document.querySelectorAll('.toggle-btn[data-view]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.toggle-btn[data-view]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                viewMode = btn.dataset.view;
                rebuildAllCharts();
            });
        });

        // Chart mode toggle (overlay / split)
        document.querySelectorAll('.toggle-btn[data-chartmode]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.toggle-btn[data-chartmode]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                chartMode = btn.dataset.chartmode;
                rebuildAllCharts();
            });
        });

        document.getElementById('show-min').addEventListener('change', (e) => { showMin = e.target.checked; rebuildAllCharts(); });
        document.getElementById('show-max').addEventListener('change', (e) => { showMax = e.target.checked; rebuildAllCharts(); });
        document.getElementById('split-tasks')?.addEventListener('change', (e) => { rebuildAllCharts(); });

        if (runIds.length < 2) {
            document.getElementById('charts-area').innerHTML = '<div class="empty-state"><p>Select at least 2 runs to compare.</p></div>';
        } else {
            init();
        }

        // ── Label helpers ─────────────────────────

        function getRunLabel(id) {
            if (labelBy === '__run_id__') return `Run ${shortId(id)}`;
            const info = runsInfo[id];
            if (info && info.hyperparameters && info.hyperparameters[labelBy] !== undefined) {
                return `${labelBy}: ${info.hyperparameters[labelBy]}`;
            }
            return `Run ${shortId(id)}`;
        }

        function updateLabels() {
            // Update loss data labels
            Object.keys(runsLossData).forEach(id => {
                runsLossData[id].label = getRunLabel(id);
            });
            // Update metric data labels
            Object.keys(runsMetricData).forEach(name => {
                Object.keys(runsMetricData[name]).forEach(id => {
                    runsMetricData[name][id].label = getRunLabel(id);
                });
            });
        }

        function collectAllHpKeys() {
            const keys = new Set();
            runIds.forEach(id => {
                const info = runsInfo[id];
                if (info && info.hyperparameters) {
                    Object.keys(info.hyperparameters).forEach(k => keys.add(k));
                }
            });
            return [...keys].sort();
        }

        function rebuildLabelByOptions() {
            const select = document.getElementById('label-by-select');
            const prevValue = select.value;
            const hpKeys = collectAllHpKeys();
            let html = '<option value="__run_id__">Run ID</option>';
            hpKeys.forEach(k => {
                html += `<option value="${k}"${k === prevValue ? ' selected' : ''}>${k}</option>`;
            });
            select.innerHTML = html;
            // Restore selection if it still exists
            if (hpKeys.includes(prevValue)) {
                select.value = prevValue;
                labelBy = prevValue;
            } else {
                select.value = '__run_id__';
                labelBy = '__run_id__';
            }
        }

        // ── Tooltip HTML builder ──────────────────

        function buildTooltipHtml(id) {
            const info = runsInfo[id];
            let html = `<div class="tooltip-run-id">ID: ${id}</div>`;

            // Hyperparameters section
            html += '<div class="tooltip-section-title">Hyperparameters</div>';
            if (info && info.hyperparameters && Object.keys(info.hyperparameters).length > 0) {
                html += '<div class="tooltip-hp-list">';
                Object.entries(info.hyperparameters).forEach(([k, v]) => {
                    html += `<div class="tooltip-hp-row"><span class="tooltip-hp-key">${k}</span><span class="tooltip-hp-val">${v}</span></div>`;
                });
                html += '</div>';
            } else {
                html += '<div class="tooltip-empty">No hyperparameters</div>';
            }

            // Note section
            html += '<div class="tooltip-section-title" style="margin-top:6px;">Note</div>';
            if (info && info.note) {
                html += `<div class="tooltip-note">${info.note}</div>`;
            } else {
                html += '<div class="tooltip-empty">No note</div>';
            }

            return html;
        }

        // ── Init & Data ───────────────────────────

        async function init() {
            buildLegend();
            const hasRunning = await fetchAllData();
            if (hasRunning) {
                document.getElementById('compare-polling-status').innerHTML =
                    '<span class="polling-indicator"><span class="polling-dot"></span> Live</span>';
                polling.start(() => fetchAllData());
            }
        }

        function buildLegend() {
            document.getElementById('runs-legend').innerHTML = runIds.map((id, i) => {
                const color = RUN_COLORS[i % RUN_COLORS.length].border;
                const displayLabel = getRunLabel(id);
                const tooltipContent = buildTooltipHtml(id);
                return `<span class="run-legend-item">
          <span class="run-legend-dot" style="background:${color};box-shadow:0 0 6px ${color};"></span>
          <span class="run-legend-label">${displayLabel}</span>
          <div class="run-legend-tooltip">${tooltipContent}</div>
        </span>`;
            }).join('');
        }

        async function fetchAllData() {
            let hasRunning = false;
            try {
                const results = await Promise.all(runIds.map(async (id) => {
                    const [losses, metrics] = await Promise.all([api.getLosses(id), api.getMetrics(id)]);
                    return { id, losses, metrics };
                }));

                try {
                    const runs = await api.getRunsByModel(modelId);
                    runs.forEach(r => {
                        runStatuses[r.id] = r.status;
                        if (runIds.includes(r.id)) runsInfo[r.id] = r;
                    });
                } catch (e) { /* ignore */ }

                // Rebuild label-by options based on fetched hyperparameters
                rebuildLabelByOptions();

                // Reset data
                runsLossData = {};
                runsMetricData = {};

                results.forEach(r => {
                    runsLossData[r.id] = { data: r.losses, label: getRunLabel(r.id) };

                    // Process metrics to support multitask grouping (e.g. "segmentation/accuracy")
                    const processedMetrics = r.metrics.map(m => {
                        const nameParts = m.metric_name.split('/');
                        if (nameParts.length > 1) {
                            return {
                                ...m,
                                task_name: nameParts.slice(0, -1).join('/'),
                                metric_name: nameParts[nameParts.length - 1]
                            };
                        }
                        return { ...m, task_name: SINGLE_TASK };
                    });

                    const metricNames = [...new Set(processedMetrics.map(m => m.metric_name))];
                    metricNames.forEach(name => {
                        if (!runsMetricData[name]) runsMetricData[name] = {};
                        runsMetricData[name][r.id] = {
                            data: processedMetrics.filter(m => m.metric_name === name),
                            label: getRunLabel(r.id),
                        };
                    });
                });

                runIds.forEach(id => { if (runStatuses[id] === 'running') hasRunning = true; });

                buildLegend();
                rebuildAllCharts();

                if (!hasRunning && polling.timers.length > 0) {
                    polling.stopAll();
                    document.getElementById('compare-polling-status').innerHTML =
                        '<span class="status-badge completed">All Completed</span>';
                }
            } catch (err) { console.error('Error fetching comparison data:', err); }
            return hasRunning;
        }

        // ── Chart Rendering ───────────────────────

        function getAllTabKeys() {
            const tabs = ['loss'];
            Object.keys(runsMetricData).forEach(n => tabs.push(n));
            return tabs;
        }

        function destroyAllCharts() {
            Object.values(charts).forEach(c => { if (c) c.destroy(); });
            charts = {};
        }

        function rebuildAllCharts() {
            destroyAllCharts();
            const area = document.getElementById('charts-area');
            const tabKeys = getAllTabKeys();

            if (tabKeys.length === 0) {
                area.innerHTML = '<div class="empty-state"><p>No data available yet.</p></div>';
                return;
            }

            if (viewMode === 'tabs') {
                renderTabsView(area, tabKeys);
            } else {
                renderScrollView(area, tabKeys);
            }
        }

        // ── Task filtering ────────────────────────
        let activeTasks = {}; // metricKey -> set of active tasks

        function getTasksForKey(key) {
            const tasksSet = new Set();
            if (key === 'loss') {
                Object.values(runsLossData).forEach(run => {
                    const tasks = extractTaskNames(run.data);
                    tasks.forEach(t => tasksSet.add(t));
                });
            } else if (runsMetricData[key]) {
                Object.values(runsMetricData[key]).forEach(run => {
                    const tasks = extractTaskNames(run.data);
                    tasks.forEach(t => tasksSet.add(t));
                });
            }
            return Array.from(tasksSet).sort((a, b) => {
                if (a === SINGLE_TASK) return -1;
                if (b === SINGLE_TASK) return 1;
                return a.localeCompare(b);
            });
        }

        function initActiveTasks(key) {
            if (!activeTasks[key]) {
                const tasks = getTasksForKey(key);
                activeTasks[key] = new Set(tasks);
            }
        }

        function buildTaskSelectorHtml(key) {
            const tasks = getTasksForKey(key);
            if (tasks.length <= 1) return '';

            initActiveTasks(key);
            const selected = activeTasks[key];

            let html = `<div class="task-selector" id="task-sel-${key}" style="margin-bottom: 15px;">
                <span class="task-selector-label" style="font-weight: 500; font-family: Inter; color: var(--text-light); margin-right: 12px; font-size: 13px;">Selected Tasks:</span>
                <div class="task-selector-btns" style="display: flex; gap: 8px; flex-wrap: wrap;">`;

            tasks.forEach(t => {
                const isSelected = selected.has(t);
                const activeClass = isSelected ? 'active' : '';
                html += `<button class="task-btn ${activeClass}" data-key="${key}" data-task="${t}" style="font-size: 12px; border-radius: 6px;">${taskLabel(t)}</button>`;
            });

            html += `</div></div>`;
            return html;
        }

        function wireTaskSelectors(container, onTaskChanged = null) {
            container.querySelectorAll('.task-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const key = btn.dataset.key;
                    const task = btn.dataset.task;

                    if (!activeTasks[key]) initActiveTasks(key);
                    const selected = activeTasks[key];

                    if (selected.has(task)) {
                        // Prevent unselecting the last task
                        if (selected.size > 1) {
                            selected.delete(task);
                            btn.classList.remove('active');
                        }
                    } else {
                        selected.add(task);
                        btn.classList.add('active');
                    }

                    if (onTaskChanged) {
                        onTaskChanged(key);
                    } else {
                        // Update UI button states
                        const sel = document.getElementById(`task-sel-${key}`);
                        if (sel) {
                            sel.querySelectorAll('.task-btn').forEach(b => {
                                const t = b.dataset.task;
                                if (selected.has(t)) b.classList.add('active');
                                else b.classList.remove('active');
                            });
                        }

                        // Rebuild just this chart
                        if (charts[key]) { charts[key].destroy(); delete charts[key]; }
                        if (charts[`${key}-train`]) { charts[`${key}-train`].destroy(); delete charts[`${key}-train`]; }
                        if (charts[`${key}-val`]) { charts[`${key}-val`].destroy(); delete charts[`${key}-val`]; }

                        renderCompChart(key);
                    }
                });
            });
        }

        // ── Render Chart structure ────────────────

        function chartContainerHtml(key) {
            const isCompact = viewMode === 'tabs' && chartMode === 'overlay';
            const compactClass = isCompact ? ' compact' : '';

            initActiveTasks(key);
            const taskFilters = Array.from(activeTasks[key] || []);
            const splitTasks = document.getElementById('split-tasks')?.checked;

            if (taskFilters.length > 1 && splitTasks) {
                let html = '';
                taskFilters.forEach(task => {
                    const taskClean = task.replace(/[^a-zA-Z0-9]/g, '_');
                    if (chartMode === 'overlay') {
                        html += `<div class="charts-row single"><div class="chart-wrapper${compactClass}" data-chart-key="${key}-${taskClean}"><canvas id="chart-${key}-${taskClean}-overlay"></canvas></div></div>`;
                    } else {
                        html += `<div class="charts-row">
                            <div class="chart-wrapper" data-chart-key="${key}-${taskClean}-train"><canvas id="chart-${key}-${taskClean}-train"></canvas></div>
                            <div class="chart-wrapper" data-chart-key="${key}-${taskClean}-val"><canvas id="chart-${key}-${taskClean}-val"></canvas></div>
                        </div>`;
                    }
                });
                return html;
            }

            if (chartMode === 'overlay') {
                return `<div class="charts-row single"><div class="chart-wrapper${compactClass}" data-chart-key="${key}"><canvas id="chart-${key}-overlay"></canvas></div></div>`;
            } else {
                return `<div class="charts-row">
          <div class="chart-wrapper" data-chart-key="${key}-train"><canvas id="chart-${key}-train"></canvas></div>
          <div class="chart-wrapper" data-chart-key="${key}-val"><canvas id="chart-${key}-val"></canvas></div>
        </div>`;
            }
        }

        function renderTabsView(area, tabKeys) {
            if (!tabKeys.includes(activeTab)) activeTab = tabKeys[0];

            let html = '<div class="tabs-container"><div class="tabs-header">';
            tabKeys.forEach(k => {
                html += `<button class="tab-btn ${k === activeTab ? 'active' : ''}" data-tab="${k}">${k === 'loss' ? 'Loss' : k}</button>`;
            });
            html += '</div>';
            tabKeys.forEach(k => {
                const taskSelHtml = buildTaskSelectorHtml(k);
                html += `<div class="tab-panel ${k === activeTab ? 'active' : ''}" id="tab-${k}">
          ${taskSelHtml}
          <div class="chart-container" id="chart-container-${k}">${chartContainerHtml(k)}</div>
        </div>`;
            });
            html += '</div>';
            area.innerHTML = html;

            wireTaskSelectors(area);

            area.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    activeTab = btn.dataset.tab;
                    area.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    area.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                    document.getElementById(`tab-${activeTab}`).classList.add('active');
                    destroyAllCharts();
                    renderCompChart(activeTab);
                });
            });

            renderCompChart(activeTab);
        }

        function renderScrollView(area, tabKeys) {
            let html = '';
            tabKeys.forEach(k => {
                const taskSelHtml = buildTaskSelectorHtml(k);
                html += `<div class="chart-section">
          <div class="chart-section-header"><h2 class="chart-section-title">${k === 'loss' ? 'Loss' : k}</h2></div>
          ${taskSelHtml}
          <div class="chart-container" id="chart-container-${k}">${chartContainerHtml(k)}</div>
        </div>`;
            });
            area.innerHTML = html;
            wireTaskSelectors(area);
            tabKeys.forEach(k => renderCompChart(k));
        }

        function renderCompChart(key) {
            const dataSource = key === 'loss' ? runsLossData : (runsMetricData[key] || {});
            const label = key === 'loss' ? 'Loss' : key;

            initActiveTasks(key);
            const taskFilters = Array.from(activeTasks[key] || []);
            const tasks = getTasksForKey(key);
            const multi = tasks.length > 1;
            const splitTasks = document.getElementById('split-tasks')?.checked;

            const splitToggle = document.getElementById('split-tasks-group');
            if (multi) {
                if (splitToggle) splitToggle.style.display = 'flex';
            } else {
                if (splitToggle) splitToggle.style.display = 'none';
            }

            if (multi && splitTasks && taskFilters.length > 1) {
                taskFilters.forEach(task => {
                    const taskClean = task.replace(/[^a-zA-Z0-9]/g, '_');
                    const taskTitle = `${label} — ${taskLabel(task)}`;

                    if (chartMode === 'overlay') {
                        const canvas = document.getElementById(`chart-${key}-${taskClean}-overlay`);
                        if (!canvas) return;
                        charts[`${key}-${taskClean}`] = createComparisonChart(canvas, dataSource, null, taskTitle, null, showMin, showMax, [task]);
                        canvas.closest('.chart-wrapper').addEventListener('click', () => {
                            openFullscreenChart((fsCanvas) =>
                                createComparisonChart(fsCanvas, dataSource, null, taskTitle, null, showMin, showMax, [task])
                            );
                        });
                    } else {
                        // Split mode: separate train and validation charts
                        const trainCanvas = document.getElementById(`chart-${key}-${taskClean}-train`);
                        const valCanvas = document.getElementById(`chart-${key}-${taskClean}-val`);
                        if (trainCanvas) {
                            const titleSplit = `${taskTitle} — Train`;
                            charts[`${key}-${taskClean}-train`] = createComparisonChart(trainCanvas, dataSource, 'train', titleSplit, null, showMin, showMax, [task]);
                            trainCanvas.closest('.chart-wrapper').addEventListener('click', () => {
                                openFullscreenChart((fsCanvas) =>
                                    createComparisonChart(fsCanvas, dataSource, 'train', titleSplit, null, showMin, showMax, [task])
                                );
                            });
                        }
                        if (valCanvas) {
                            const titleSplit = `${taskTitle} — Validation`;
                            charts[`${key}-${taskClean}-val`] = createComparisonChart(valCanvas, dataSource, 'validation', titleSplit, null, showMin, showMax, [task]);
                            valCanvas.closest('.chart-wrapper').addEventListener('click', () => {
                                openFullscreenChart((fsCanvas) =>
                                    createComparisonChart(fsCanvas, dataSource, 'validation', titleSplit, null, showMin, showMax, [task])
                                );
                            });
                        }
                    }
                });
                return;
            }

            if (chartMode === 'overlay') {
                const canvas = document.getElementById(`chart-${key}-overlay`);
                if (!canvas) return;
                const title = `${label} — All Runs`;
                charts[key] = createComparisonChart(canvas, dataSource, null, title, null, showMin, showMax, taskFilters);
                canvas.closest('.chart-wrapper').addEventListener('click', () => {
                    const extraHtml = multi ? buildTaskSelectorHtml(key) : '';
                    openFullscreenChart((fsCanvas) => {
                        const curFilters = Array.from(activeTasks[key] || []);
                        return createComparisonChart(fsCanvas, dataSource, null, title, null, showMin, showMax, curFilters);
                    },
                        extraHtml,
                        (header, reRender) => {
                            if (extraHtml) {
                                wireTaskSelectors(header, () => {
                                    destroyAllCharts();
                                    if (viewMode === 'tabs') renderCompChart(activeTab); else getAllTabKeys().forEach(k => renderCompChart(k));

                                    reRender(newCanvas => {
                                        const curFilters = Array.from(activeTasks[key] || []);
                                        return createComparisonChart(newCanvas, dataSource, null, title, null, showMin, showMax, curFilters);
                                    });
                                });
                            }
                        }
                    );
                });
            } else {
                // Split mode: separate train and validation charts
                const trainCanvas = document.getElementById(`chart-${key}-train`);
                const valCanvas = document.getElementById(`chart-${key}-val`);
                if (trainCanvas) {
                    const title = `${label} — Train`;
                    charts[`${key}-train`] = createComparisonChart(trainCanvas, dataSource, 'train', title, null, showMin, showMax, taskFilters);
                    trainCanvas.closest('.chart-wrapper').addEventListener('click', () => {
                        const extraHtml = multi ? buildTaskSelectorHtml(key) : '';
                        openFullscreenChart((fsCanvas) => {
                            const curFilters = Array.from(activeTasks[key] || []);
                            return createComparisonChart(fsCanvas, dataSource, 'train', title, null, showMin, showMax, curFilters);
                        },
                            extraHtml,
                            (header, reRender) => {
                                if (extraHtml) {
                                    wireTaskSelectors(header, () => {
                                        destroyAllCharts();
                                        if (viewMode === 'tabs') renderCompChart(activeTab); else getAllTabKeys().forEach(k => renderCompChart(k));

                                        reRender(newCanvas => {
                                            const curFilters = Array.from(activeTasks[key] || []);
                                            return createComparisonChart(newCanvas, dataSource, 'train', title, null, showMin, showMax, curFilters);
                                        });
                                    });
                                }
                            }
                        );
                    });
                }
                if (valCanvas) {
                    const title = `${label} — Validation`;
                    charts[`${key}-val`] = createComparisonChart(valCanvas, dataSource, 'validation', title, null, showMin, showMax, taskFilters);
                    valCanvas.closest('.chart-wrapper').addEventListener('click', () => {
                        const extraHtml = multi ? buildTaskSelectorHtml(key) : '';
                        openFullscreenChart((fsCanvas) => {
                            const curFilters = Array.from(activeTasks[key] || []);
                            return createComparisonChart(fsCanvas, dataSource, 'validation', title, null, showMin, showMax, curFilters);
                        },
                            extraHtml,
                            (header, reRender) => {
                                if (extraHtml) {
                                    wireTaskSelectors(header, () => {
                                        destroyAllCharts();
                                        if (viewMode === 'tabs') renderCompChart(activeTab); else getAllTabKeys().forEach(k => renderCompChart(k));

                                        reRender(newCanvas => {
                                            const curFilters = Array.from(activeTasks[key] || []);
                                            return createComparisonChart(newCanvas, dataSource, 'validation', title, null, showMin, showMax, curFilters);
                                        });
                                    });
                                }
                            }
                        );
                    });
                }
            }
        }

        window.addEventListener('beforeunload', () => polling.stopAll());
    </script>
</body>

</html>
