<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ML Training Monitor — Compare multiple experiment runs" />
    <title>ML Monitor — Compare Runs</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
</head>

<body>
    <div class="page-wrapper">
        <div id="navbar-slot"></div>

        <!-- Breadcrumbs -->
        <div class="breadcrumbs">
            <a href="index.html">Home</a>
            <span class="separator">›</span>
            <a href="#" id="breadcrumb-model-link">Model</a>
            <span class="separator">›</span>
            <span class="current">Compare Runs</span>
        </div>

        <!-- Page Header -->
        <div class="page-header">
            <h1 class="page-title"><span class="gradient-text">Compare</span> Runs</h1>
            <p class="page-subtitle" id="compare-subtitle">Overlayed charts for selected experiments</p>
        </div>

        <!-- Runs Legend -->
        <div class="compare-toolbar" id="runs-summary">
            <div class="compare-toolbar-info" id="runs-legend"></div>
            <div style="display:flex;align-items:center;gap:16px;">
                <div class="label-select-group">
                    <span class="label-select-label">Label by:</span>
                    <select class="label-select" id="label-by-select">
                        <option value="__run_id__">Run ID</option>
                    </select>
                </div>
                <div id="compare-polling-status"></div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar-row">
            <div class="toolbar-left">
                <div class="toggle-group">
                    <span class="toggle-label">View:</span>
                    <div class="toggle-buttons">
                        <button class="toggle-btn active" data-view="tabs">Tabs</button>
                        <button class="toggle-btn" data-view="scroll">Scroll</button>
                    </div>
                </div>
                <div class="toggle-group">
                    <span class="toggle-label">Mode:</span>
                    <div class="toggle-buttons">
                        <button class="toggle-btn active" data-chartmode="overlay">Overlay</button>
                        <button class="toggle-btn" data-chartmode="split">Split</button>
                    </div>
                </div>
            </div>
            <div class="toolbar-right">
                <label class="checkbox-control">
                    <input type="checkbox" id="show-min" /> Show Min
                </label>
                <label class="checkbox-control">
                    <input type="checkbox" id="show-max" /> Show Max
                </label>
            </div>
        </div>

        <!-- Charts Area -->
        <div id="charts-area">
            <div class="loading-spinner">
                <div class="spinner"></div><span>Loading comparison data...</span>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="charts.js"></script>
    <script>
        document.getElementById('navbar-slot').innerHTML = buildNavbar('');

        const runIdsParam = getQueryParam('runs') || '';
        const modelName = getQueryParam('model') || 'Model';
        const projectName = getQueryParam('project') || '';
        const modelId = getQueryParam('model_id') || '';
        const runIds = runIdsParam.split(',').filter(Boolean);

        // Breadcrumbs
        const modelLink = document.getElementById('breadcrumb-model-link');
        modelLink.textContent = modelName;
        modelLink.href = `model.html?id=${modelId}&name=${encodeURIComponent(modelName)}&project=${encodeURIComponent(projectName)}`;
        document.getElementById('compare-subtitle').textContent = `${runIds.length} experiments · ${modelName}`;
        document.title = `ML Monitor — Compare ${runIds.length} Runs`;

        // State
        let runsLossData = {};
        let runsMetricData = {};
        let runStatuses = {};
        let runsInfo = {};          // full run objects keyed by id
        let labelBy = '__run_id__'; // current label selection
        let charts = {};
        let viewMode = 'tabs';
        let chartMode = 'overlay';  // 'overlay' | 'split'
        let activeTab = 'loss';
        let showMin = false;
        let showMax = false;
        const polling = new PollingManager(3000);

        // ── Label-by handler ──────────────────────

        document.getElementById('label-by-select').addEventListener('change', (e) => {
            labelBy = e.target.value;
            updateLabels();
            buildLegend();
            rebuildAllCharts();
        });

        // ── Toolbar handlers ──────────────────────

        document.querySelectorAll('.toggle-btn[data-view]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.toggle-btn[data-view]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                viewMode = btn.dataset.view;
                rebuildAllCharts();
            });
        });

        // Chart mode toggle (overlay / split)
        document.querySelectorAll('.toggle-btn[data-chartmode]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.toggle-btn[data-chartmode]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                chartMode = btn.dataset.chartmode;
                rebuildAllCharts();
            });
        });

        document.getElementById('show-min').addEventListener('change', (e) => { showMin = e.target.checked; rebuildAllCharts(); });
        document.getElementById('show-max').addEventListener('change', (e) => { showMax = e.target.checked; rebuildAllCharts(); });

        if (runIds.length < 2) {
            document.getElementById('charts-area').innerHTML = '<div class="empty-state"><p>Select at least 2 runs to compare.</p></div>';
        } else {
            init();
        }

        // ── Label helpers ─────────────────────────

        function getRunLabel(id) {
            if (labelBy === '__run_id__') return `Run ${shortId(id)}`;
            const info = runsInfo[id];
            if (info && info.hyperparameters && info.hyperparameters[labelBy] !== undefined) {
                return `${labelBy}: ${info.hyperparameters[labelBy]}`;
            }
            return `Run ${shortId(id)}`;
        }

        function updateLabels() {
            // Update loss data labels
            Object.keys(runsLossData).forEach(id => {
                runsLossData[id].label = getRunLabel(id);
            });
            // Update metric data labels
            Object.keys(runsMetricData).forEach(name => {
                Object.keys(runsMetricData[name]).forEach(id => {
                    runsMetricData[name][id].label = getRunLabel(id);
                });
            });
        }

        function collectAllHpKeys() {
            const keys = new Set();
            runIds.forEach(id => {
                const info = runsInfo[id];
                if (info && info.hyperparameters) {
                    Object.keys(info.hyperparameters).forEach(k => keys.add(k));
                }
            });
            return [...keys].sort();
        }

        function rebuildLabelByOptions() {
            const select = document.getElementById('label-by-select');
            const prevValue = select.value;
            const hpKeys = collectAllHpKeys();
            let html = '<option value="__run_id__">Run ID</option>';
            hpKeys.forEach(k => {
                html += `<option value="${k}"${k === prevValue ? ' selected' : ''}>${k}</option>`;
            });
            select.innerHTML = html;
            // Restore selection if it still exists
            if (hpKeys.includes(prevValue)) {
                select.value = prevValue;
                labelBy = prevValue;
            } else {
                select.value = '__run_id__';
                labelBy = '__run_id__';
            }
        }

        // ── Tooltip HTML builder ──────────────────

        function buildTooltipHtml(id) {
            const info = runsInfo[id];
            let html = `<div class="tooltip-run-id">ID: ${id}</div>`;

            // Hyperparameters section
            html += '<div class="tooltip-section-title">Hyperparameters</div>';
            if (info && info.hyperparameters && Object.keys(info.hyperparameters).length > 0) {
                html += '<div class="tooltip-hp-list">';
                Object.entries(info.hyperparameters).forEach(([k, v]) => {
                    html += `<div class="tooltip-hp-row"><span class="tooltip-hp-key">${k}</span><span class="tooltip-hp-val">${v}</span></div>`;
                });
                html += '</div>';
            } else {
                html += '<div class="tooltip-empty">No hyperparameters</div>';
            }

            // Note section
            html += '<div class="tooltip-section-title" style="margin-top:6px;">Note</div>';
            if (info && info.note) {
                html += `<div class="tooltip-note">${info.note}</div>`;
            } else {
                html += '<div class="tooltip-empty">No note</div>';
            }

            return html;
        }

        // ── Init & Data ───────────────────────────

        async function init() {
            buildLegend();
            const hasRunning = await fetchAllData();
            if (hasRunning) {
                document.getElementById('compare-polling-status').innerHTML =
                    '<span class="polling-indicator"><span class="polling-dot"></span> Live</span>';
                polling.start(() => fetchAllData());
            }
        }

        function buildLegend() {
            document.getElementById('runs-legend').innerHTML = runIds.map((id, i) => {
                const color = RUN_COLORS[i % RUN_COLORS.length].border;
                const displayLabel = getRunLabel(id);
                const tooltipContent = buildTooltipHtml(id);
                return `<span class="run-legend-item">
          <span class="run-legend-dot" style="background:${color};box-shadow:0 0 6px ${color};"></span>
          <span class="run-legend-label">${displayLabel}</span>
          <div class="run-legend-tooltip">${tooltipContent}</div>
        </span>`;
            }).join('');
        }

        async function fetchAllData() {
            let hasRunning = false;
            try {
                const results = await Promise.all(runIds.map(async (id) => {
                    const [losses, metrics] = await Promise.all([api.getLosses(id), api.getMetrics(id)]);
                    return { id, losses, metrics };
                }));

                try {
                    const runs = await api.getRunsByModel(modelId);
                    runs.forEach(r => {
                        runStatuses[r.id] = r.status;
                        if (runIds.includes(r.id)) runsInfo[r.id] = r;
                    });
                } catch (e) { /* ignore */ }

                // Rebuild label-by options based on fetched hyperparameters
                rebuildLabelByOptions();

                // Reset data
                runsLossData = {};
                runsMetricData = {};

                results.forEach(r => {
                    runsLossData[r.id] = { data: r.losses, label: getRunLabel(r.id) };
                    const metricNames = [...new Set(r.metrics.map(m => m.metric_name))];
                    metricNames.forEach(name => {
                        if (!runsMetricData[name]) runsMetricData[name] = {};
                        runsMetricData[name][r.id] = {
                            data: r.metrics.filter(m => m.metric_name === name),
                            label: getRunLabel(r.id),
                        };
                    });
                });

                runIds.forEach(id => { if (runStatuses[id] === 'running') hasRunning = true; });

                buildLegend();
                rebuildAllCharts();

                if (!hasRunning && polling.timers.length > 0) {
                    polling.stopAll();
                    document.getElementById('compare-polling-status').innerHTML =
                        '<span class="status-badge completed">All Completed</span>';
                }
            } catch (err) { console.error('Error fetching comparison data:', err); }
            return hasRunning;
        }

        // ── Chart Rendering ───────────────────────

        function getAllTabKeys() {
            const tabs = ['loss'];
            Object.keys(runsMetricData).forEach(n => tabs.push(n));
            return tabs;
        }

        function destroyAllCharts() {
            Object.values(charts).forEach(c => { if (c) c.destroy(); });
            charts = {};
        }

        function rebuildAllCharts() {
            destroyAllCharts();
            const area = document.getElementById('charts-area');
            const tabKeys = getAllTabKeys();

            if (tabKeys.length === 0) {
                area.innerHTML = '<div class="empty-state"><p>No data available yet.</p></div>';
                return;
            }

            if (viewMode === 'tabs') {
                renderTabsView(area, tabKeys);
            } else {
                renderScrollView(area, tabKeys);
            }
        }

        function chartContainerHtml(key) {
            const isCompact = viewMode === 'tabs' && chartMode === 'overlay';
            const compactClass = isCompact ? ' compact' : '';
            if (chartMode === 'overlay') {
                return `<div class="charts-row single"><div class="chart-wrapper${compactClass}" data-chart-key="${key}"><canvas id="chart-${key}-overlay"></canvas></div></div>`;
            } else {
                return `<div class="charts-row">
          <div class="chart-wrapper" data-chart-key="${key}-train"><canvas id="chart-${key}-train"></canvas></div>
          <div class="chart-wrapper" data-chart-key="${key}-val"><canvas id="chart-${key}-val"></canvas></div>
        </div>`;
            }
        }

        function renderTabsView(area, tabKeys) {
            if (!tabKeys.includes(activeTab)) activeTab = tabKeys[0];

            let html = '<div class="tabs-container"><div class="tabs-header">';
            tabKeys.forEach(k => {
                html += `<button class="tab-btn ${k === activeTab ? 'active' : ''}" data-tab="${k}">${k === 'loss' ? 'Loss' : k}</button>`;
            });
            html += '</div>';
            tabKeys.forEach(k => {
                html += `<div class="tab-panel ${k === activeTab ? 'active' : ''}" id="tab-${k}">
          <div class="chart-container">${chartContainerHtml(k)}</div>
        </div>`;
            });
            html += '</div>';
            area.innerHTML = html;

            area.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    activeTab = btn.dataset.tab;
                    area.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    area.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                    document.getElementById(`tab-${activeTab}`).classList.add('active');
                    destroyAllCharts();
                    renderCompChart(activeTab);
                });
            });

            renderCompChart(activeTab);
        }

        function renderScrollView(area, tabKeys) {
            let html = '';
            tabKeys.forEach(k => {
                html += `<div class="chart-section">
          <div class="chart-section-header"><h2 class="chart-section-title">${k === 'loss' ? 'Loss' : k}</h2></div>
          <div class="chart-container">${chartContainerHtml(k)}</div>
        </div>`;
            });
            area.innerHTML = html;
            tabKeys.forEach(k => renderCompChart(k));
        }

        function renderCompChart(key) {
            const dataSource = key === 'loss' ? runsLossData : (runsMetricData[key] || {});
            const label = key === 'loss' ? 'Loss' : key;

            if (chartMode === 'overlay') {
                const canvas = document.getElementById(`chart-${key}-overlay`);
                if (!canvas) return;
                const title = `${label} — All Runs`;
                charts[key] = createComparisonChart(canvas, dataSource, null, title, null, showMin, showMax);
                canvas.closest('.chart-wrapper').addEventListener('click', () => {
                    openFullscreenChart((fsCanvas) =>
                        createComparisonChart(fsCanvas, dataSource, null, title, null, showMin, showMax)
                    );
                });
            } else {
                // Split mode: separate train and validation charts
                const trainCanvas = document.getElementById(`chart-${key}-train`);
                const valCanvas = document.getElementById(`chart-${key}-val`);
                if (trainCanvas) {
                    const title = `${label} — Train`;
                    charts[`${key}-train`] = createComparisonChart(trainCanvas, dataSource, 'train', title, null, showMin, showMax);
                    trainCanvas.closest('.chart-wrapper').addEventListener('click', () => {
                        openFullscreenChart((fsCanvas) =>
                            createComparisonChart(fsCanvas, dataSource, 'train', title, null, showMin, showMax)
                        );
                    });
                }
                if (valCanvas) {
                    const title = `${label} — Validation`;
                    charts[`${key}-val`] = createComparisonChart(valCanvas, dataSource, 'validation', title, null, showMin, showMax);
                    valCanvas.closest('.chart-wrapper').addEventListener('click', () => {
                        openFullscreenChart((fsCanvas) =>
                            createComparisonChart(fsCanvas, dataSource, 'validation', title, null, showMin, showMax)
                        );
                    });
                }
            }
        }

        window.addEventListener('beforeunload', () => polling.stopAll());
    </script>
</body>

</html>
